name: Cập nhật dữ liệu Thuế Nghệ An

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Loại dữ liệu cần cập nhật"
        required: truename: Cập nhật dữ liệu Thuế Nghệ An

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Loại dữ liệu cần cập nhật"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - news
  schedule:
    # Giờ UTC. Cập nhật tin vào phút 07 và 37 mỗi giờ.
    - cron: "7,37 * * * *"
    # Cập nhật toàn bộ vào phút 19 mỗi 6 giờ.
    - cron: "19 */6 * * *"
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/update-data.yml"

permissions:
  contents: write

concurrency:
  group: nghean-tax-data-update
  cancel-in-progress: false

jobs:
  update-data:
    name: Thu thập bằng Chromium và lưu dữ liệu
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cài Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      # Playwright đã được khai báo cố định trong package.json và package-lock.json.
      - name: Cài thư viện Node.js, gồm Playwright
        run: npm ci

      - name: Cài Chromium và thư viện hệ điều hành
        run: npx playwright install --with-deps chromium

      - name: Kiểm tra Playwright trước khi thu thập
        shell: bash
        run: |
          npx playwright --version
          node -e "import('playwright').then(() => console.log('Playwright module: OK')).catch((e) => { console.error(e); process.exit(1); })"
          node -e "import('playwright').then(async ({ chromium }) => { const b = await chromium.launch({ headless: true, args: ['--no-sandbox'] }); console.log('Chromium launch: OK'); await b.close(); }).catch((e) => { console.error(e); process.exit(1); })"

      - name: Xác định chế độ cập nhật
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ inputs.mode }}"
          elif [[ "${{ github.event_name }}" == "schedule" && "${{ github.event.schedule }}" == "19 */6 * * *" ]]; then
            MODE="full"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            MODE="full"
          else
            MODE="news"
          fi
          echo "MODE=$MODE" >> "$GITHUB_ENV"
          echo "Chế độ cập nhật: $MODE"

      - name: Cập nhật tin tức bằng trình duyệt thật
        if: env.MODE == 'news'
        run: npm run collect:news
        env:
          BROWSER_ENABLED: "true"
          BROWSER_TIMEOUT_MS: "90000"
          BROWSER_SETTLE_MS: "2500"
          MAX_BROWSER_NEWS_PAGES: "40"
          CACHE_IMAGES: "true"
          MAX_CACHED_IMAGES: "160"
          REQUEST_TIMEOUT_MS: "25000"
          REQUEST_RETRIES: "1"
          MAX_NEWS_PAGES: "20"
          READER_ENABLED: "false"

      - name: Cập nhật toàn bộ dữ liệu bằng trình duyệt thật
        if: env.MODE == 'full'
        run: npm run collect:full
        env:
          BROWSER_ENABLED: "true"
          BROWSER_TIMEOUT_MS: "90000"
          BROWSER_SETTLE_MS: "2500"
          MAX_BROWSER_NEWS_PAGES: "40"
          MAX_BROWSER_DOC_PAGES: "100"
          CACHE_IMAGES: "true"
          MAX_CACHED_IMAGES: "160"
          REQUEST_TIMEOUT_MS: "25000"
          REQUEST_RETRIES: "1"
          MAX_NEWS_PAGES: "20"
          MAX_DOC_PAGES: "100"
          READER_ENABLED: "false"

      - name: Kiểm tra JSON
        run: npm run validate

      - name: Ghi báo cáo vào Summary
        if: always()
        shell: bash
        run: npm run report >> "$GITHUB_STEP_SUMMARY"

      - name: Lưu JSON, thumbnail và chẩn đoán vào repository
        if: always()
        shell: bash
        run: |
          git config user.name "nghean-tax-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "Không có thay đổi dữ liệu."
            exit 0
          fi
          git commit -m "data: cập nhật bằng Chromium ($MODE)"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Xác nhận dữ liệu live đúng trang danh sách
        if: always()
        run: npm run assert:refresh
        default: "full"
        type: choice
        options:
          - full
          - news

  schedule:
    # Cập nhật tin tức hai lần mỗi giờ
    - cron: "17,47 * * * *"

    # Cập nhật toàn bộ dữ liệu mỗi 6 giờ
    - cron: "23 */6 * * *"

permissions:
  contents: write

concurrency:
  group: nghean-tax-data-update
  cancel-in-progress: false

jobs:
  update-data:
    name: Thu thập và lưu dữ liệu
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Tải mã nguồn repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cài đặt Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Cài đặt thư viện
        run: npm ci

      - name: Xác định chế độ cập nhật
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ inputs.mode }}"
          elif [[ "${{ github.event.schedule }}" == "23 */6 * * *" ]]; then
            MODE="full"
          else
            MODE="news"
          fi

          echo "MODE=$MODE" >> "$GITHUB_ENV"
          echo "Chế độ cập nhật: $MODE"

      - name: Cập nhật tin tức
        if: env.MODE == 'news'
        run: npm run collect:news

      - name: Cập nhật toàn bộ dữ liệu
        if: env.MODE == 'full'
        run: npm run collect:full

      - name: Kiểm tra dữ liệu JSON
        run: npm run validate

      - name: Lưu dữ liệu mới vào repository
        shell: bash
        run: |
          git config user.name "nghean-tax-bot"
          git config user.email "actions@users.noreply.github.com"

          git add docs

          if git diff --cached --quiet; then
            echo "Không có dữ liệu mới cần lưu."
            exit 0
          fi

          git commit -m "Tự động cập nhật dữ liệu Thuế Nghệ An"
          git pull --rebase origin main
          git push origin main
